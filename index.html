<!DOCTYPE html>

<head>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #050505;
            --maroon-bright: #ff1a1a;
            --glass-white: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.12);
            --text-main: #ffffff;
        }

        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--bg-deep); 
            color: var(--text-main);
            margin: 0; padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* --- LIQUID BACKGROUND --- */
        .liquid-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden;
        }
        .blob {
            position: absolute; border-radius: 50%; filter: blur(60px);
            opacity: 0.4; animation: move 15s infinite alternate ease-in-out;
        }
        .blob-1 { width: 500px; height: 500px; background: #800000; top: -10%; left: -10%; }
        .blob-2 { width: 400px; height: 400px; background: #4a0000; bottom: -5%; right: -5%; animation-delay: -4s; }
        
        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(60px, 40px) scale(1.2); }
        }

        .container-main {
            width: 100%;
            max-width: 420px;
            padding: 50px 24px;
            z-index: 10;
        }

        /* --- HEADER & SHINING TITLE --- */
        .header-section {
            text-align: center;
            margin-bottom: 45px;
        }
        .logo-3d {
            width: 100px; height: 100px;
            margin: 0 auto 20px auto;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
            animation: float 4s infinite ease-in-out;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .title-glow {
            font-weight: 800;
            font-size: 19px;
            letter-spacing: 2px;
            text-transform: uppercase;
            /* Shimmer Effect */
            background: linear-gradient(
                120deg, 
                #ffffff 30%, 
                #800000 50%, 
                #ffffff 70%
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }

        /* --- GLASS 3D BUTTONS --- */
        .glass-btn {
            width: 100%;
            background: var(--glass-white);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 16px 22px;
            margin-bottom: 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            color: #fff;
            box-shadow: 
                0 15px 35px rgba(0,0,0,0.3),
                inset 0 1px 1px rgba(255,255,255,0.1),
                inset 0 -2px 5px rgba(0,0,0,0.5);
        }

        .glass-btn:active {
            transform: scale(0.96);
        }

        .glass-btn i {
            font-size: 18px;
            width: 35px;
            filter: drop-shadow(0 0 5px rgba(255,255,255,0.2));
        }

        .btn-text {
            flex: 1;
            text-align: center;
            font-weight: 700;
            font-size: 11px; /* Ukuran teks diperkecil sesuai instruksi */
            letter-spacing: 1.2px;
            margin-right: 35px;
            opacity: 0.9;
        }

        /* Colors */
        .c-wa i { color: #25D366; }
        .c-web i { color: #ff3333; }
        .c-ig i { color: #E1306C; }
        .c-tt i { color: #fff; }
        .c-yt i { color: #FF0000; }
        .c-mail i { color: #FFBB00; }

        .section-label {
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #444;
            margin: 30px 0 15px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        .section-label::before, .section-label::after {
            content: ""; height: 1px; flex: 1; background: #1a1a1a;
        }

        footer {
            margin-top: 50px;
            padding-bottom: 30px;
            text-align: center;
            opacity: 0.2;
            font-size: 8px;
            letter-spacing: 4px;
            font-weight: 700;
        }
    </style>
</head>
